name: couple_app
description: 情侣日常 App - 记录美好每一刻

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # 网络请求
  dio: ^5.7.0

  # 状态管理与路由
  get: ^4.6.6

  # BLoC 状态管理（复杂业务用）
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # 本地存储
  shared_preferences: ^2.3.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.2.2

  # 图片
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2

  # 工具
  intl: ^0.19.0
  logger: ^2.4.0
  json_annotation: ^4.9.0

  # 日历
  table_calendar: ^3.1.2

  # 定位
  geolocator: ^13.0.1
  permission_handler: ^11.3.1

  # 推送
  flutter_local_notifications: ^17.2.3

  # 聊天
  socket_io_client: ^3.0.0
  emoji_picker_flutter: ^3.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.13
  json_serializable: ^6.8.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
